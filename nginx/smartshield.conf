# ============================================
# SmartShield — Nginx Configuration
# ============================================
# Place this file at: /etc/nginx/sites-available/smartshield.conf
# Then symlink: sudo ln -s /etc/nginx/sites-available/smartshield.conf /etc/nginx/sites-enabled/
# Reload: sudo nginx -s reload

# ─── Dynamic Rate Limiting Map ───────────────────────────────────────────────
# The detection engine writes attacker IPs to this file (one IP per line).
# Nginx checks it on every request to decide if rate limiting should apply.
# File format example:  "192.168.1.5" 1;
geo $is_rate_limited {
    default 0;
    include /etc/nginx/conf.d/smartshield_ratelimit.conf;
}

# If an IP is rate-limited, set the limit_key to their IP format. If not, set to empty string (bypasses rate limit).
map $is_rate_limited $limit_key {
    0 "";
    1 $binary_remote_addr;
}

# ─── Rate Limiting Zone ───────────────────────────────────────────────────────
# Limits flagged IPs to 10 requests/second with a burst of 20
limit_req_zone $limit_key zone=smartshield_limit:10m rate=10r/s;

# ─── CAPTCHA Map ─────────────────────────────────────────────────────────────
# The detection engine writes attacker IPs to this file for CAPTCHA enforcement.
# File format example:  "192.168.1.5" 1;
geo $needs_captcha {
    default 0;
    include /etc/nginx/conf.d/smartshield_captcha.conf;
}

server {
    listen 80;
    server_name localhost;

    # ─── CAPTCHA Redirect for Flagged IPs ────────────────────────────────
    # If this IP is marked for CAPTCHA by the detection engine,
    # redirect ALL their requests to the /captcha page.
    set $do_captcha 0;
    if ($needs_captcha = 1) {
        set $do_captcha 1;
    }
    if ($request_uri = "/captcha") {
        set $do_captcha 0;
    }
    if ($do_captcha = 1) {
        return 302 /captcha;
    }

    # ─── Proxy to Node.js Backend ────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting — auto-applied to IPs flagged by detection engine
        limit_req zone=smartshield_limit burst=20 nodelay;
        limit_req_status 429;
    }

    # ─── Proxy to Target Website (The site you want to protect) ──
    # To protect an external website (like one on Vercel), replace the localhost URL
    # below with your Vercel app link (e.g., https://your-app.vercel.app;).
    location / {
        # Rate limiting — only applied to IPs flagged by detection engine
        limit_req zone=smartshield_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:4000; # <--- ADD YOUR WEBSITE LINK HERE (e.g. https://site.vercel.app;)
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── CAPTCHA Challenge Page ──────────────────
    # When defence mode is captcha, suspicious IPs get redirected here
    location /captcha {
        return 200 '<!DOCTYPE html>
        <html>
        <head><title>Security Check - SmartShield</title></head>
        <body style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;background:#f8f9fc;">
            <div style="text-align:center;padding:40px;background:white;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                <h2>Security Verification</h2>
                <p>Please verify you are human to continue.</p>
                <p style="color:#8e95a9;font-size:14px;">SmartShield DDoS Protection</p>
            </div>
        </body>
        </html>';
        add_header Content-Type text/html;
    }

    # ─── Error Pages ─────────────────────────────
    error_page 429 /429.html;
    location = /429.html {
        return 429 '<!DOCTYPE html>
        <html>
        <head><title>Rate Limited - SmartShield</title></head>
        <body style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;background:#f8f9fc;">
            <div style="text-align:center;padding:40px;background:white;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                <h2>Too Many Requests</h2>
                <p>You are being rate limited. Please try again later.</p>
                <p style="color:#8e95a9;font-size:14px;">SmartShield DDoS Protection</p>
            </div>
        </body>
        </html>';
        add_header Content-Type text/html;
    }
}
